name: Dependabot auto-merge
on:
  workflow_run:
    workflows: [Docs]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Dependabot pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" --jq '.[0].number')
          ACTOR=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.user.login')
          if [ "$ACTOR" != "dependabot[bot]" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Fetch Dependabot metadata
        if: steps.pr.outputs.skip != 'true'
        id: metadata
        uses: dependabot/fetch-metadata@v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ steps.pr.outputs.number }}

      - name: Merge patch and minor updates
        if: |
          steps.pr.outputs.skip != 'true' && (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
            steps.metadata.outputs.dependency-group != ''
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --squash --delete-branch
